spring.application.name=jpaTutorial

spring.jpa.hibernate.ddl-auto=create
#Drop old tables and create fresh tables every time application starts.
#update/create/validate/create-drop/none

#the table we have and the entity we are getting, if they both are different then the validate will give an error.
# then we have create-drop as well do we need to create a table as soon as server run and also drop that table as soon as server closes
#Then we have none also which is used if we dont need to change anything when our entity is update so,
# we can use none and the validate in the production, and the create/update and create-drop in development

spring.jpa.show-sql=true
#shows queries that hibernate generates

spring.jpa.properties.hibernate.format_sql=true
#queries that are coming from above queries will be beautified in good format

#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
# The Hibernate dialect tells Hibernate which database is being used
# and defines the database-specific SQL syntax and features.
# Hibernate uses this information to convert JPQL/HQL into the
# appropriate SQL queries for that database.

spring.datasource.url = jdbc:mysql://localhost:3306/test?useSSL=false
spring.datasource.username =demo_user
spring.datasource.password =demo_pass
# --------------------------------------
spring.jpa.defer-datasource-initialization=true
#tells Spring Boot to delay running your SQL initialization scripts until after
# Hibernate has completely created your database tables
#-------------------------------------------
spring.sql.init.mode=always
#forces Spring Boot to always execute your SQL initialization scripts
# every time the application starts, regardless of the database type
#-------------------------------------------
spring.sql.init.data-location=classpath:data.sql
#explicitly defines the file path for your data insertion scripts (DML)
#Why it matters: It directs Spring Boot to look specifically for a file named data.sql
# inside your project's src/main/resources folder (the root of your classpath)
#-------------------------------------------